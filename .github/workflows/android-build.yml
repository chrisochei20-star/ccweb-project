# Manual Android artifact build: debug APK + release AAB (Capacitor).
# Trigger: Actions → "Android Build" → Run workflow
name: Android Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-35 build-tools;35.0.0

      - name: Install dependencies
        run: npm ci

      - name: Write google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret not set — APK/AAB will build without FCM (google-services plugin skipped)."
            exit 0
          fi
          mkdir -p android/app
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Sync Capacitor Android project
        run: npm run mobile:sync

      - name: Build debug APK and release AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug bundleRelease --no-daemon

      - name: Upload app-debug.apk
        uses: actions/upload-artifact@v4
        with:
          name: ccweb-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload app-release.aab
        uses: actions/upload-artifact@v4
        with:
          name: ccweb-app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
