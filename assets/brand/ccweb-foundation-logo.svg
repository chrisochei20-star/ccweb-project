<?xml version="1.0" encoding="UTF-8"?>
<!--
  CCWEB Foundation official mark  lightning bolt in premium cyan/white.
  Source for Android adaptive icons, splash, and notification assets.
  Safe zone: keep bolt within inner 66% circle of adaptive foreground (108dp canvas).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" fill="none">
  <defs>
    <linearGradient id="boltGrad" x1="32" y1="18" x2="76" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="54" cy="54" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Adaptive safe-zone guide (hidden in exports) -->
  <circle cx="54" cy="54" r="33" stroke="#22D3EE" stroke-opacity="0.08" stroke-width="0.5" fill="none"/>
  <!-- Soft glow ring -->
  <circle cx="54" cy="54" r="38" fill="url(#glowGrad)"/>
  <!-- Lightning bolt  canonical CCWEB Foundation mark -->
  <path
    fill="url(#boltGrad)"
    d="M58.5 22 L38 58 H52 L49.5 86 L70 50 H56 L58.5 22 Z"
  />
</svg>
