<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ccweb-project</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        max-width: 560px;
        padding: 2rem;
        border-radius: 12px;
        background: #1e293b;
        box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3);
      }

      h1 {
        margin-top: 0;
      }

      code {
        background: #0f172a;
        padding: 0.2rem 0.4rem;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ccweb-project dev environment is running</h1>
      <p>If you can see this page, the Node.js server started successfully.</p>
      <p>Try the health endpoint at <code>/health</code>.</p>
    </main>
  </body>
</html>
