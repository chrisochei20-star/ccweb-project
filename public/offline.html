<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#030712" />
    <title>Offline — CCWEB</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #030712;
        color: #e2e8f0;
        padding: 1.5rem;
      }
      .card {
        max-width: 22rem;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.25rem;
        padding: 2rem 1.5rem;
        background: rgba(10, 19, 40, 0.75);
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1.25rem;
        color: #94a3b8;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      button {
        min-height: 44px;
        padding: 0.65rem 1.25rem;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(90deg, #22d3ee, #a78bfa);
        color: #030712;
        font-weight: 700;
        font-size: 0.875rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>CCWEB needs a network connection for auth, messaging, and live feeds. Check your connection and try again.</p>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
